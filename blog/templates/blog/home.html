{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Мой блог</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <h1>Все посты</h1>

    {% for post in posts %}
        <div>
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
            <small>Создано: {{ post.created_at }}</small>
        </div>
        <hr>
    {% empty %}
        <p>Нет постов :(</p>
    {% endfor %}
</body>
</html>

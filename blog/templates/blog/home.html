{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Мой блог</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <h1>Все посты</h1>

    {% for post in posts %}
        <div class="post">
            <h2><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h2>
            <p>{{ post.content|truncatewords:30 }}</p>
            <small>Создано: {{ post.created_at }}</small>
        </div>
    {% empty %}
        <p>Нет постов :(</p>
    {% endfor %}
</body>
</html>
